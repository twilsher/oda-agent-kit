name: Publish packages

# Trigger 1: push a semver tag  (e.g. v0.2.0 or v0.2.0-beta.1)
# Trigger 2: manual dispatch from the Actions UI
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dist_tag:
        description: 'npm dist-tag to publish under (latest / rc / beta / alpha)'
        required: true
        default: 'latest'
        type: choice
        options:
          - latest
          - rc
          - beta
          - alpha

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm provenance
    outputs:
      version: ${{ steps.version.outputs.version }}
      dist_tag: ${{ steps.tag.outputs.dist_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Determine dist-tag
        id: tag
        # On a tag push, derive the dist-tag from the version string.
        #   v0.2.0-alpha.1 → alpha
        #   v0.2.0-beta.2  → beta
        #   v0.2.0-rc.1    → rc
        #   v0.2.0         → latest
        # On manual dispatch, use the user-supplied input.
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${{ github.ref_name }}"        # e.g. v0.2.0-beta.1
            VERSION="${TAG#v}"                  # strip leading 'v'
            if [[ "$VERSION" == *"-alpha"* ]]; then
              DIST_TAG="alpha"
            elif [[ "$VERSION" == *"-beta"* ]]; then
              DIST_TAG="beta"
            elif [[ "$VERSION" == *"-rc"* ]]; then
              DIST_TAG="rc"
            else
              DIST_TAG="latest"
            fi
          else
            DIST_TAG="${{ inputs.dist_tag }}"
          fi
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing with dist-tag: $DIST_TAG"

      # Publish in dependency order: core must come before adapters.
      - name: Publish @oda-agent/core
        run: |
          npm publish \
            --workspace=packages/core \
            --access public \
            --tag "${{ steps.tag.outputs.dist_tag }}" \
            --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @oda-agent/cli
        run: |
          npm publish \
            --workspace=packages/cli \
            --access public \
            --tag "${{ steps.tag.outputs.dist_tag }}" \
            --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @oda-agent/mcp-server
        run: |
          npm publish \
            --workspace=packages/mcp-server \
            --access public \
            --tag "${{ steps.tag.outputs.dist_tag }}" \
            --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @oda-agent/openclaw-plugin
        run: |
          npm publish \
            --workspace=packages/openclaw-plugin \
            --access public \
            --tag "${{ steps.tag.outputs.dist_tag }}" \
            --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  smoke-test:
    name: Smoke-test published packages
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Wait for registry propagation
        # Give the npm registry up to ~2 minutes to make the new packages
        # visible. Check both @oda-agent/core and @oda-agent/openclaw-plugin
        # so the install step doesn't race against a partially-propagated core.
        # Retry up to 6 times with 20-second pauses.
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          echo "Waiting for @oda-agent/core@$VERSION and @oda-agent/openclaw-plugin@$VERSION to appear on npm..."
          for attempt in 1 2 3 4 5 6; do
            if npm view "@oda-agent/core@$VERSION" version \
                --registry https://registry.npmjs.org 2>/dev/null \
              && npm view "@oda-agent/openclaw-plugin@$VERSION" version \
                --registry https://registry.npmjs.org 2>/dev/null; then
              echo "Packages are available (attempt $attempt)"
              exit 0
            fi
            echo "Attempt $attempt: packages not yet fully available — waiting 20 s"
            sleep 20
          done
          echo "ERROR: @oda-agent/core@$VERSION and/or @oda-agent/openclaw-plugin@$VERSION were not found on npm after 2 minutes" >&2
          exit 1

      - name: Install and smoke-test @oda-agent/openclaw-plugin (pinned core)
        # Create a minimal standalone project that pins BOTH packages to the
        # published version. This confirms the tarballs are importable as real
        # npm dependencies (no workspace '*' resolution).
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          SMOKE_DIR="$(mktemp -d)"
          trap 'rm -rf "$SMOKE_DIR"' EXIT

          echo "Smoke dir: $SMOKE_DIR"

          cat > "$SMOKE_DIR/package.json" <<EOF
          {
            "name": "smoke-test-pinned",
            "version": "0.0.1",
            "private": true,
            "dependencies": {
              "@oda-agent/core": "$VERSION",
              "@oda-agent/openclaw-plugin": "$VERSION"
            }
          }
          EOF

          cp scripts/verify-imports.cjs "$SMOKE_DIR/"

          cd "$SMOKE_DIR"
          npm install --prefer-online --ignore-scripts --no-audit --no-fund --registry https://registry.npmjs.org
          node verify-imports.cjs

      - name: Install and smoke-test @oda-agent/openclaw-plugin (unpinned core)
        # Install only the plugin without pinning core — this mirrors what a
        # real consumer does. The plugin declares "@oda-agent/core": "*" so npm
        # will resolve whichever core version is available on the registry.
        # This validates that the '*' dependency range works end-to-end.
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          SMOKE_DIR="$(mktemp -d)"
          trap 'rm -rf "$SMOKE_DIR"' EXIT

          echo "Smoke dir: $SMOKE_DIR"

          cat > "$SMOKE_DIR/package.json" <<EOF
          {
            "name": "smoke-test-unpinned",
            "version": "0.0.1",
            "private": true,
            "dependencies": {
              "@oda-agent/openclaw-plugin": "$VERSION"
            }
          }
          EOF

          cp scripts/verify-imports.cjs "$SMOKE_DIR/"

          cd "$SMOKE_DIR"
          npm install --prefer-online --ignore-scripts --no-audit --no-fund --registry https://registry.npmjs.org
          node verify-imports.cjs
